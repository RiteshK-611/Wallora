<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #media-element {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .error {
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="media-container"></div>
    <div class="error" id="error-display">Failed to load wallpaper</div>
    
    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const mediaPath = urlParams.get('path');
        const mediaType = urlParams.get('type');
        const isStartup = urlParams.get('startup') === 'true';
        
        console.log('Loading wallpaper:', mediaPath, mediaType, 'startup:', isStartup);
        console.log('Current URL:', window.location.href);
        
        if (mediaPath && mediaType) {
            const container = document.getElementById('media-container');
            const errorDisplay = document.getElementById('error-display');
            
            // Adjust retry logic based on startup
            let loadAttempts = 0;
            const maxAttempts = isStartup ? 5 : 3;
            const baseDelay = isStartup ? 2000 : 1000;
            
            function attemptLoad() {
                loadAttempts++;
                console.log(`Load attempt ${loadAttempts}/${maxAttempts} for:`, mediaPath, isStartup ? '(startup)' : '');
                
                if (loadAttempts > maxAttempts) {
                    console.error('Max load attempts reached for:', mediaPath);
                    errorDisplay.style.display = 'block';
                    errorDisplay.textContent = `Failed to load after ${maxAttempts} attempts. File may be corrupted or inaccessible.`;
                    return;
                }
                
                loadMedia();
            }
            
            function loadMedia() {
            // Handle GIF files (they can be treated as images or videos depending on browser)
            if (mediaType === 'gif' || mediaType === 'image/gif' || mediaType.startsWith('image/')) {
                // Handle GIF files
                const img = document.createElement('img');
                img.id = 'media-element';
                img.src = mediaPath;
                img.alt = 'Wallpaper';
                
                img.onload = function() {
                    console.log('GIF/Image loaded successfully');
                    console.log('Image dimensions:', img.naturalWidth, 'x', img.naturalHeight);
                    errorDisplay.style.display = 'none';
                };
                
                img.onerror = function() {
                    console.error('GIF/Image failed to load:', mediaPath);
                    console.log('Image error details:', img.naturalWidth, img.naturalHeight);
                    
                    if (loadAttempts < maxAttempts) {
                        console.log(`Retrying image load in ${baseDelay * loadAttempts}ms...`);
                        img.remove();
                        setTimeout(attemptLoad, baseDelay * loadAttempts);
                    } else {
                        // If image fails, try as video (some GIFs work better as video)
                        console.log('All image attempts failed, trying as video...');
                        img.remove();
                        createVideoElement();
                    }
                };
                
                container.appendChild(img);
                
            } else {
                createVideoElement();
            }
            }
            
            function createVideoElement() {
                // Handle video files
                const video = document.createElement('video');
                video.id = 'media-element';
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.preload = 'auto';
                
                // Try multiple source formats for better compatibility
                const source = document.createElement('source');
                source.src = mediaPath;
                source.type = mediaType;
                video.appendChild(source);
                
                let hasLoaded = false;
                let loadTimeout;
                
                video.addEventListener('loadeddata', function() {
                    console.log('Video loaded successfully');
                    console.log('Video dimensions:', video.videoWidth, 'x', video.videoHeight);
                    console.log('Video duration:', video.duration);
                    hasLoaded = true;
                    if (loadTimeout) clearTimeout(loadTimeout);
                    errorDisplay.style.display = 'none';
                    video.play().catch(e => {
                        console.error('Video autoplay failed:', e);
                        if (!hasLoaded) {
                            errorDisplay.style.display = 'block';
                            errorDisplay.textContent = 'Video autoplay failed';
                        }
                    });
                });
                
                video.addEventListener('loadedmetadata', function() {
                    console.log('Video metadata loaded');
                    if (!hasLoaded) {
                        hasLoaded = true;
                        if (loadTimeout) clearTimeout(loadTimeout);
                        errorDisplay.style.display = 'none';
                    }
                });
                
                video.addEventListener('error', function(e) {
                    console.error('Video loading error:', e, video.error);
                    console.error('Video error code:', video.error ? video.error.code : 'Unknown');
                    console.error('Video error message:', video.error ? video.error.message : 'Unknown');
                    console.error('Media path being loaded:', mediaPath);
                    console.error('Is startup restoration:', isStartup);
                    if (loadTimeout) clearTimeout(loadTimeout);
                    
                    if (!hasLoaded) {
                        if (loadAttempts < maxAttempts) {
                            console.log(`Retrying video load in ${baseDelay * loadAttempts}ms...`);
                            video.remove();
                            setTimeout(attemptLoad, baseDelay * loadAttempts);
                        } else {
                            video.style.display = 'none';
                            errorDisplay.style.display = 'block';
                            errorDisplay.textContent = `Failed to load video after ${maxAttempts} attempts: ${video.error ? video.error.message : 'Unknown error'}`;
                        }
                    }
                });
                
                video.addEventListener('canplay', function() {
                    console.log('Video can play');
                    if (video.paused) {
                        video.play().catch(e => console.error('Manual play failed:', e));
                    }
                });
                
                // Timeout fallback with retry logic
                const timeoutDuration = isStartup ? 15000 : 10000; // Longer timeout for startup
                loadTimeout = setTimeout(() => {
                    if (!hasLoaded && video.readyState < 2) {
                        console.error(`Video loading timeout after ${timeoutDuration}ms. ReadyState:`, video.readyState);
                        console.error('Network state:', video.networkState);
                        console.error('Media path:', mediaPath);
                        console.error('Is startup:', isStartup);
                        
                        if (loadAttempts < maxAttempts) {
                            console.log(`Timeout reached, retrying in ${baseDelay * loadAttempts}ms...`);
                            video.remove();
                            setTimeout(attemptLoad, baseDelay * loadAttempts);
                        } else {
                            errorDisplay.style.display = 'block';
                            errorDisplay.textContent = `Video loading timeout after ${maxAttempts} attempts - file may not exist or be corrupted`;
                        }
                    }
                }, timeoutDuration);
                
                container.appendChild(video);
            }
            
            // Start the loading process
            attemptLoad();
        } else {
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').textContent = 'No media path provided';
        }
    </script>
</body>
</html>
